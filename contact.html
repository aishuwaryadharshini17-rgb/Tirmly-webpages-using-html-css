<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/service.css">  
    <link rel="stylesheet" href="css/about.css">

<!-- ===== TOP OFFER ===== -->
<div class="top-offer">
  Flat 15% Off for First-Time Clients — Use Code TRIMLY15
</div>

<!-- ===== HEADER ===== -->
<header class="navbar">
  <div class="nav-container">

    
  <div class="logo">
    <img src="image/logo.png" alt="logo">

</div>
 
      
    <ul class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="service.html">Service</a>
        <a href="pricing.html">Pricing</a>
        <a href="contact.html">Contact</a>
    </ul>

     <!-- Theme Toggle -->
    <div class="theme-toggle">
      <button id="theme-toggle">
        <span id="theme-icon">🌙</span>
      </button>
    </div>

<button id="swapBtn" class="swap-btn">⇄</button>
<button class="book-btn">Book Appointment</button>

  </div>

</header>




<section class="contact-section">

        <h2 class="section-title">Contact Us</h2>

        <div class="contact-container">

            <!-- CONTACT INFO -->

            <div class="contact-info">

                <div class="info-box">
                    <div class="icon">📞</div>
                    <div>
                        <h3>Phone</h3>
                        <p>+61 3 8376 6284</p>
                    </div>
                </div>

                <div class="info-box">
                    <div class="icon">✉</div>
                    <div>
                        <h3>Email</h3>
                        <p>info@trimlystyle.com</p>
                    </div>
                </div>

                <div class="info-box">
                    <div class="icon">📍</div>
                    <div>
                        <h3>Address</h3>
                        <p>Swanston Street, Melbourne<br>Victoria 3053 Australia</p>
                    </div>
                </div>

                <div class="info-box">
                    <div class="icon">🕒</div>
                    <div>
                        <h3>Working Hours</h3>
                        <p>Mon – Sat: 9:00 am to 6:00 pm</p>
                    </div>
                </div>

            </div>


            <!-- CONTACT FORM -->

            <div class="contact-form">

                <form>

                    <input type="text" placeholder="Your Name" required>

                    <input type="email" placeholder="Your Email" required>

                    <input type="text" placeholder="Subject">

                    <input type="text" placeholder="your message">

                    <button type="submit">Send Message</button>

                </form>

            </div>

        </div>

    </section>





<!-- Scroll Top Button -->
<button id="scrollTop">
    ↑
</button>
